apiVersion: apps/v1
kind: Deployment
metadata:
  name: codevault-api
  namespace: codevault-exec
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codevault-api
  template:
    metadata:
      labels:
        app: codevault-api
    spec:
      serviceAccountName: codevault-executor
      containers:
      - name: codevault-api
        image: codevault-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: EXECUTOR_MODE
          value: "k8s"
        - name: EXECUTION_NAMESPACE
          value: "codevault-exec"
        - name: REDIS_HOST
          value: "redis-service.codevault-exec.svc.cluster.local"
        - name: DB_URL
          value: "mongodb://mongo-service.codevault-exec.svc.cluster.local:27017/codevault"
        - name: PORT
          value: "3000"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: codevault-exec
spec:
  type: NodePort
  selector:
    app: codevault-api
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30001
