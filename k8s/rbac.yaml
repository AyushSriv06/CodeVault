apiVersion: v1
kind: ServiceAccount
metadata:
  name: codevault-executor
  namespace: codevault-exec
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-manager
  namespace: codevault-exec
rules:
- apiGroups: ["batch", "extensions"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-manager-binding
  namespace: codevault-exec
subjects:
- kind: ServiceAccount
  name: codevault-executor
  namespace: codevault-exec
roleRef:
  kind: Role
  name: job-manager
  apiGroup: rbac.authorization.k8s.io
